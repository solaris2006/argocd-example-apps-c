apiVersion: logging.banzaicloud.io/v1beta1
kind: ClusterOutput
metadata:
  name: elasticsearch-vm
  namespace: logging
spec:
  elasticsearch:
    host: 192.168.121.246
    port: 9200
    scheme: https
    user: elastic
    ssl_verify: false
    password: 
      valueFrom:
        secretKeyRef:
          name: elasticsearch-master-credentials
          key: password

    logstash_format: true
    logstash_prefix_record_key: app_group