apiVersion: logging.banzaicloud.io/v1beta1
kind: ClusterFlow
metadata:
  name: all-logs-flow
  namespace: logging
spec:
  filters:
    - tag_normaliser: {} # Standardizes tags to 'kubernetes.var.log.containers...'
    - record_transformer:
        enable_ruby: true
        record:
          # This logic mimics your Filebeat fallback: name label OR app label OR namespace
          app_group: ${ record.dig("kubernetes", "labels", "name") || record.dig("kubernetes", "labels", "app") || record.dig("kubernetes", "namespace_name") }
  globalOutputRefs:
    - elasticsearch-vm