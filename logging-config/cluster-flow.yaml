apiVersion: logging.banzaicloud.io/v1beta1
kind: ClusterFlow
metadata:
  name: all-logs-flow
  namespace: logging
spec:
  filters:
    - record_transformer:
        enable_ruby: true
        record:
          app_group: '${ (record.dig("kubernetes", "labels", "name") || record.dig("kubernetes", "labels", "app") || record.dig("kubernetes", "namespace_name") || "unknown").downcase }'
  globalOutputRefs:
    - elasticsearch-vm