apiVersion: logging.banzaicloud.io/v1beta1
kind: ClusterOutput
metadata:
  name: es-output
  namespace: logging
spec:
  elasticsearch:
    host: 192.168.121.246
    port: 9200
    scheme: https
    user: elastic
    ssl_verify: false
    ssl_version: TLSv1_2
    password: 
      valueFrom:
        secretKeyRef:
          name: elasticsearch-master-credentials
          key: password

    buffer:
      timekey: 1m
      timekey_wait: 30s
      timekey_use_utc: true