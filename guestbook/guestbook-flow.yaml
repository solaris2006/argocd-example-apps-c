apiVersion: logging.banzaicloud.io/v1beta1
kind: Flow
metadata:
  name: guestbook-flow
  namespace: guestbook
spec:
  match:
    - select:
        labels:
          app: guestbook-ui
  filters:
    - record_modifier:
        records:
          - app_group: "guestbook"
  globalOutputRefs:
    - elasticsearch-vm