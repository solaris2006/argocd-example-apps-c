apiVersion: logging.banzaicloud.io/v1beta1
kind: Flow
metadata:
  name: guestbook-flow
  namespace: guestbook
spec:
  filters:
    - tag_normaliser: {}
    # - parser:
    #     remove_key_name_field: true
    #     reserve_data: true
    #     parse:
    #       type: nginx
    - parser:
        remove_key_name_field: true
        reserve_data: true
        parse:
          type: nginx      
  match:
     - select:
         labels:
           app: guestbook-ui
  globalOutputRefs:
    - elasticsearch-vm
