{{- range .Values.applications }}
{{- $config := $.Values.config -}}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ printf "example.%s" .name | quote }}
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: {{ .namespace | default .name | quote }}
    server: {{ $config.spec.destination.server | quote }}
  project: default
  source:
    path: {{ .path | default .name | quote }}
    repoURL: {{ $config.spec.source.repoURL }}
    targetRevision: {{ $config.spec.source.targetRevision }}
    {{- with .tool }}
    {{- . | toYaml | nindent 4 }}
    {{- end }}

  {{- if eq .name "logging-config" }}
  ignoreDifferences:
    - group: logging.banzaicloud.io
      kind: ClusterFlow
      name: all-logs-flow
      jsonPointers:
        - /spec/filters/0/record_transformer/record   # Changed to 'record'
        - /spec/filters/1/rewrite_tag_filter/rules    # Added this for the second filter
        - /status
  {{- end }}
  # ----------------------

  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true
---
{{ end -}}