apiVersion: apps/v1
kind: Deployment
metadata:
  name: release-name-helm-guestbook
spec:
  template:
    spec:
      containers:
        - name: helm-guestbook
          image: 'gcr.io/google-samples/gb-frontend:v5'

---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: vault-secret-example
spec:
  refreshInterval: "15s"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: vault-secret-example
  data:
  - secretKey: my-vault-injected-password
    remoteRef:
      key: secret/data/guestbook
      property: password
